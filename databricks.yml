bundle:
  name: uc-catalog-mcp

variables:
  catalog_allowlist:
    description: "Comma-separated list of Unity Catalog catalogs to index"
    default: ""
  sync_schedule:
    description: "Cron schedule for the sync job (quartz format)"
    default: "0 */6 * * *"
  lakebase_instance:
    description: "Lakebase instance name for vector storage"
    default: ""

resources:
  apps:
    uc-catalog-mcp:
      name: "uc-catalog-mcp"
      description: "MCP server for semantic Unity Catalog discovery"
      source_code_path: ./app

  jobs:
    uc-catalog-sync:
      name: "uc-catalog-sync"
      description: "Incremental sync of Unity Catalog metadata to Lakebase (fleshed out in issue #6)"
      schedule:
        quartz_cron_expression: "${var.sync_schedule}"
        timezone_id: "UTC"
      tasks:
        - task_key: sync
          notebook_task:
            notebook_path: ./sync/job.py

targets:
  dev:
    mode: development
    default: true

  prod:
    mode: production
